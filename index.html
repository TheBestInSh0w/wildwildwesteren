<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Terraria Launcher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      text-align: center;
      padding-top: 50px;
    }
    button {
      padding: 15px 30px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
      background: #4caf50;
      color: white;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>

<body>

  <h1>Terraria Web Launcher</h1>
  <p>Click below to launch the game in a new tab.</p>

  <button onclick="openBlankPage()">Launch Terraria</button>

  <script>
  function openBlankPage() {
    const html = `
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <base href="https://cdn.jsdelivr.net/gh/web-ports/terraria@main/">
  <link rel="icon" href="./app.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Terraria</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-L7856P3VNT"><\/script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-L7856P3VNT');
  <\/script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- ⭐ Persistent Save System (IDBFS) -->
  <script>
    var Module = {
      preRun: [
        function() {
          try { FS.mkdir('/save'); } catch(e) {}
          FS.mount(IDBFS, {}, '/save');
          FS.syncfs(true, function(err) {
            console.log("Loaded save data", err);
          });
        }
      ],
      postRun: [
        function() {
          setInterval(() => {
            FS.syncfs(false, function(err) {
              console.log("Saved to IndexedDB", err);
            });
          }, 5000);
        }
      ]
    };
  <\/script>

  <script type="module" crossorigin src="main.js"><\/script>
</head>

<body>
  <div id="app"></div>
  <canvas id="canvas"></canvas>
</body>
</html>
    `;

    // Convert HTML → Blob URL
    const blob = new Blob([html], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    // Open Terraria in a new tab
    window.open(url, "_blank");
  }
  </script>

</body>
</html>
